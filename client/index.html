<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Grapefruit Cleaning Co. | Premium Residential & Commercial Cleaning</title>
    <meta name="description" content="Grapefruit Cleaning Co. delivers premium residential, commercial, Airbnb, and deep cleaning services. Get an instant quote and book online in minutes." />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Entry-script watchdog: a cached/stale index.html can reference a build
      // file that no longer exists after a redeploy. The module script then
      // fails (404 or "Unexpected token '<'") and React never mounts. The
      // dynamic-import recovery in main.tsx cannot catch that case, so detect
      // an empty #root shortly after load and force one cache-busted reload.
      (function () {
        var KEY = "entry-reload";
        window.addEventListener("load", function () {
          setTimeout(function () {
            var root = document.getElementById("root");
            if (root && root.childElementCount > 0) {
              try { sessionStorage.removeItem(KEY); } catch (e) {}
              return;
            }
            try {
              if (sessionStorage.getItem(KEY) === "1") return; // no reload loops
              sessionStorage.setItem(KEY, "1");
            } catch (e) { return; }
            var u = new URL(window.location.href);
            u.searchParams.set("v", Date.now().toString(36));
            window.location.replace(u.toString());
          }, 4000);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
